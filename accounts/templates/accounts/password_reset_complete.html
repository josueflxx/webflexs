{% extends 'base.html' %}

{% block title %}Contrasena Actualizada - FLEXS{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Contrasena actualizada</h1>
                <p>Tu contrasena fue cambiada correctamente. Ya puedes iniciar sesion.</p>
            </div>

            <div class="auth-footer">
                <a href="{% url 'login' %}" class="btn btn-primary">Ir al login</a>
            </div>
        </div>
    </div>
</div>

<style>
    .auth-page {
        min-height: calc(100vh - var(--header-offset) - 40px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: var(--spacing-2xl) 0;
    }

    .auth-page > .container {
        width: 100%;
        display: flex;
        justify-content: center;
    }

    .auth-card {
        background: var(--color-dark-light);
        border-radius: var(--radius-xl);
        padding: var(--spacing-3xl);
        width: 100%;
        max-width: 460px;
        margin: 0 auto;
        border: 1px solid rgba(255, 255, 255, 0.1);
        text-align: center;
    }

    .auth-header h1 {
        font-size: var(--font-size-3xl);
        margin-bottom: var(--spacing-sm);
    }

    .auth-header p {
        color: var(--color-gray-light);
        margin-bottom: var(--spacing-2xl);
    }

    .auth-footer {
        padding-top: var(--spacing-xl);
        border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
</style>
{% endblock %}
