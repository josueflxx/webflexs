<!doctype html>
<html lang="es">
<body style="margin:0; padding:0; background:#0f141c; font-family:Arial, sans-serif; color:#f4f6fb;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#0f141c; padding:28px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px; background:#151b26; border:1px solid #2a3444; border-radius:16px; overflow:hidden;">
          <tr>
            <td style="padding:26px 28px 10px;">
              <p style="margin:0 0 8px; color:#ff6b3d; font-size:12px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;">FLEXS</p>
              <h1 style="margin:0; font-size:24px; line-height:1.25;">Recupera el acceso a tu cuenta</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:10px 28px 24px; color:#c8d0dd; font-size:15px; line-height:1.55;">
              <p style="margin:0 0 16px;">Recibimos una solicitud para crear una clave nueva para tu cuenta.</p>
              <p style="margin:0 0 22px;">Si fuiste vos, usa este boton para continuar:</p>
              <p style="margin:0 0 22px;">
                <a href="{{ protocol }}://{{ domain }}{% url 'password_reset_confirm' uidb64=uid token=token %}" style="display:inline-block; background:#ff6b3d; color:#ffffff; text-decoration:none; font-weight:700; padding:12px 18px; border-radius:10px;">Crear nueva clave</a>
              </p>
              <p style="margin:0 0 12px; font-size:13px; color:#97a3b4;">Por seguridad, el enlace vence automaticamente.</p>
              <p style="margin:0; font-size:13px; color:#97a3b4;">Si no pediste este cambio, podes ignorar este mensaje.</p>
            </td>
          </tr>
          <tr>
            <td style="padding:18px 28px; border-top:1px solid #2a3444; color:#8792a3; font-size:12px;">
              Equipo FLEXS
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
