{% extends 'base.html' %}

{% block title %}Iniciar Sesión - FLEXS{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Iniciar Sesión</h1>
                <p>Accedé a tu cuenta para ver precios y hacer pedidos</p>
            </div>

            <form method="post" class="auth-form">
                {% csrf_token %}

                <div class="form-group">
                    <label for="username" class="form-label">Usuario</label>
                    <input type="text" name="username" id="username" class="form-input" value="{{ username_prefill|default:'' }}" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" name="password" id="password" class="form-input" required>
                </div>

                <div class="form-group auth-remember-row">
                    <label class="auth-remember-label">
                        <input
                            type="checkbox"
                            name="remember_me"
                            value="1"
                            {% if remember_me_checked %}checked{% endif %}
                        >
                        Mantener sesion iniciada
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-lg btn-block">
                    Ingresar
                </button>

                <div class="auth-help-links">
                    <a href="{% url 'password_reset' %}">Olvide mi contrasena</a>
                </div>
            </form>

            <div class="auth-footer">
                <p>¿No tenés cuenta?</p>
                <a href="{% url 'account_request' %}" class="btn btn-outline">
                    Solicitar Cuenta
                </a>
            </div>
        </div>
    </div>
</div>

<style>
    .auth-page {
        min-height: calc(100vh - var(--header-offset) - 40px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: var(--spacing-2xl) 0;
    }

    .auth-page > .container {
        width: 100%;
        display: flex;
        justify-content: center;
    }

    .auth-card {
        background: var(--color-dark-light);
        border-radius: var(--radius-xl);
        padding: var(--spacing-3xl);
        width: 100%;
        max-width: 450px;
        margin: 0 auto;
        border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .auth-header {
        text-align: center;
        margin-bottom: var(--spacing-2xl);
    }

    .auth-header h1 {
        font-size: var(--font-size-3xl);
        margin-bottom: var(--spacing-sm);
    }

    .auth-header p {
        color: var(--color-gray-light);
    }

    .auth-form {
        margin-bottom: var(--spacing-2xl);
    }

    .auth-remember-row {
        margin-top: calc(var(--spacing-sm) * -1);
        margin-bottom: var(--spacing-lg);
    }

    .auth-remember-label {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--color-gray-light);
        font-size: var(--font-size-sm);
        cursor: pointer;
        user-select: none;
    }

    .auth-remember-label input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: var(--color-primary);
    }

    .btn-block {
        width: 100%;
    }

    .auth-footer {
        text-align: center;
        padding-top: var(--spacing-xl);
        border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .auth-footer p {
        color: var(--color-gray-light);
        margin-bottom: var(--spacing-md);
    }

    .auth-help-links {
        margin-top: var(--spacing-lg);
        text-align: right;
    }

    .auth-help-links a {
        color: var(--color-primary);
        font-weight: 600;
    }

    @media (max-width: 768px) {
        .auth-page {
            min-height: calc(100vh - var(--header-offset) - 24px);
            padding: var(--spacing-xl) 0;
        }

        .auth-card {
            padding: var(--spacing-2xl);
        }
    }
</style>
{% endblock %}
